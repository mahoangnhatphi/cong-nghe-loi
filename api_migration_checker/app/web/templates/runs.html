{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Runs</h1>
  <table>
    <thead><tr><th>ID</th><th>Migration</th><th>Status</th><th>Started</th><th></th></tr></thead>
    <tbody>
      {% for run in runs %}
      <tr><td>{{ run.id }}</td><td>{{ run.migration_name }}</td><td>{{ run.status }}</td><td>{{ run.started_at }}</td><td><a href="/runs/{{ run.id }}">Open</a></td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
